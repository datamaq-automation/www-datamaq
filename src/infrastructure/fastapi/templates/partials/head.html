{% macro head_seo(request, seo_data) %}
<head>
    <meta charset='UTF-8'>
    <link rel='icon' href='{{ request.url_for('static', path='favicon.svg') }}' type='image/svg+xml'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>{{ seo_data.title }}</title>
    
    <link rel='stylesheet' crossorigin='' href='{{ request.url_for('static', path='css/index.css') }}'>
    
    <script>
        window.APP_CONFIG = {
            gaId: '{{ config.GOOGLE_ANALYTICS_ID }}',
            clarityId: '{{ config.CLARITY_ID }}',
            contactApiUrl: '{{ request.url_for("submit_contact") }}'
        };
    </script>
    
    
    <link rel='stylesheet' crossorigin='' href='{{ request.url_for('static', path='css/WhatsAppFab.css') }}'>
    <link rel='stylesheet' crossorigin='' href='{{ request.url_for('static', path='css/useContactPageActions.css') }}'>
    <link rel='stylesheet' crossorigin='' href='{{ request.url_for('static', path='css/HomePage.css') }}'>
    <link rel='stylesheet' crossorigin='' href='{{ request.url_for('static', path='css/CookieBanner.css') }}'>
    <link rel='stylesheet' crossorigin='' href='{{ request.url_for('static', path='css/LegalPage.css') }}'>

    <meta name='description' content='{{ seo_data.description }}'>
    <meta name='robots' content='index,follow'>
    
    <meta property='og:title' content='{{ seo_data.title }}'>
    <meta property='og:description' content='{{ seo_data.description }}'>
    <meta property='og:type' content='website'>
    <meta property='og:url' content='{{ seo_data.canonical_url }}'>
    <meta property='og:image' content='{{ seo_data.og_image }}'>
    <meta property='og:site_name' content='{{ seo_data.site_name }}'>
    <meta property='og:locale' content='es_AR'>
    
    <meta name='twitter:card' content='summary_large_image'>
    <meta name='twitter:title' content='{{ seo_data.title }}'>
    <meta name='twitter:description' content='{{ seo_data.description }}'>
    <meta name='twitter:image' content='{{ seo_data.og_image }}'>
    
    <link rel='canonical' href='{{ seo_data.canonical_url }}'>
    <link rel='alternate' hreflang='es_AR' href='{{ seo_data.canonical_url }}'>

    <script type='application/ld+json' children='{
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "{{ seo_data.site_name }}",
        "url": "{{ seo_data.canonical_url }}"
    }''></script>
</head>
{% endmacro %}
