<footer class="footer">

        <div class="footer-brand">
            <strong>{{ brand.brandName }}</strong>
            <p>{{ brand.baseOperativa }}</p>
        </div>
        <div class="footer-technician">
            <p><strong>{{ brand.technician.name }}</strong></p>
            <p>{{ brand.technician.role }}</p>

    </div>
    <div class="footer-bottom">
        <p>&copy; {{ now().year }} DataMaq. Todos los derechos reservados.</p>
    </div>
</footer>
