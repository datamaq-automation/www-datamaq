<header class="c-home-header" role="banner">
    <div class="c-home-header__inner">
        <a href="/" class="c-home-header__brand" aria-label="{{ brand.brandAriaLabel }}">
            <span class="c-home-header__brand-icon" aria-hidden="true">
                <i class="bi bi-terminal-fill"></i>
            </span>
            <span class="c-home-header__brand-copy">{{ brand.brandName }}</span>
        </a>
        
        <nav class="c-home-header__nav" aria-label="Navegación principal">
            {% for link in content.navbar.links %}
            <a href="{{ link.href }}" class="c-home-header__nav-link">{{ link.label }}</a>
            {% endfor %}
        </nav>
        
        <div class="c-home-header__actions">
            <a href="{{ brand.whatsappUrl }}" target="_blank" rel="noopener noreferrer" class="c-home-header__icon-link" aria-label="WhatsApp" title="WhatsApp">
                <i class="bi bi-whatsapp" aria-hidden="true"></i>
            </a>
            <a href="{{ brand.whatsappUrl }}" target="_blank" rel="noopener noreferrer" class="cta-button primary c-home-header__cta">
                Contactar por WhatsApp
            </a>
        </div>
    </div>
</header>
