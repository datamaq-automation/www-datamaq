<section id="servicios" class="servicios">
    <h2 class="section-title">{{ content.services.title }}</h2>
    <div class="servicios-grid">
        {% for card in content.services.cards %}
        <article class="servicio-card" id="{{ card.id }}">
            <div class="card-content">
                <h3>{{ card.title }}</h3>
                <p>{{ card.description }}</p>
                <ul class="card-items">
                    {% for point in card.key_points %}
                    <li><i class="bi bi-check2-circle"></i> {{ point }}</li>
                    {% endfor %}
                </ul>
            </div>
        </article>
        {% endfor %}
    </div>
</section>
