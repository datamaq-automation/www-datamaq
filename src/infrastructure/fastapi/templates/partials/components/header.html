{% import 'partials/components/icon.html' as icon_macro %}
{% macro header() %}
<header data-v-236fef00="" class="c-home-header" role="banner">
    <div data-v-236fef00="" class="tw:container tw:mx-auto tw:px-4 c-home-header__inner">
        <a data-v-236fef00="" href="/" class="tw:flex tw:items-center tw:gap-2 tw:text-dm-text-0 tw:decoration-0" aria-label="DataMaq, inicio">
            <span data-v-236fef00="" class="c-home-header__brand-icon" aria-hidden="true">
                {{ icon_macro.bootstrap_icon('terminal-fill') }}
            </span>
            <span data-v-236fef00="" class="c-home-header__brand-copy">DataMaq</span>
        </a>
        <nav data-v-236fef00="" class="c-home-header__nav tw:hidden tw:lg:flex" aria-label="Navegación principal">
            <a data-v-236fef00="" href="/#servicios" class="c-home-header__nav-link">Solución</a>
            <a data-v-236fef00="" href="/#faq" class="c-home-header__nav-link">FAQ</a>
            <a data-v-236fef00="" href="/contact" class="c-home-header__nav-link">Contacto</a>
        </nav>
        <div data-v-236fef00="" class="c-home-header__actions">
            <a data-v-236fef00="" href="/contact" class="c-home-header__icon-link tw:lg:hidden" aria-label="Contacto" title="Contacto">
                {{ icon_macro.bootstrap_icon('telephone-forward-fill') }}
            </a>
            <a data-v-236fef00="" href="/contact" class="tw:btn-primary c-home-header__cta tw:hidden tw:lg:inline-flex">Contacto</a>
        </div>
    </div>
</header>
{% endmacro %}
