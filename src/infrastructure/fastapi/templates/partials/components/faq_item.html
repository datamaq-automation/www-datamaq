{% macro faq_item(question, answer, is_open=False) %}

        <span data-v-c938c92c="">{{ question }}</span>
        <span data-v-c938c92c="" class="c-home-faq__toggle" aria-hidden="true"><i data-v-c938c92c="" class="bi bi-plus-lg"></i></span>
    </summary>
