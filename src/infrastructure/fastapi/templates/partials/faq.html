<section id="faq" class="faq">
    <h2 class="section-title">Preguntas frecuentes</h2>
    <div class="faq-container">
        {% for item in content.faq.questions %}
        <div class="faq-card">
            <details>
                <summary>{{ item.question }}</summary>
                <div class="content-wrapper">
                    <p>{{ item.answer }}</p>
                </div>
            </details>
        </div>
        {% endfor %}
    </div>
</section>
