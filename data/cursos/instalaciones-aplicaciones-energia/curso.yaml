id: "curso-instalaciones-aplicaciones-energia"
slug: "instalaciones-aplicaciones-energia"
title: "Instalaciones y Aplicaciones de la Energía"
description_short: "Curso técnico-práctico sobre instalaciones electromecánicas, media y baja tensión, subestaciones, celdas y sistemas auxiliares."
description_long: "Este curso práctico e integral te guiará a través del diseño, operación y mantenimiento de instalaciones electromecánicas industriales. Aprenderás sobre suministros en Baja Tensión, cámaras de transformación, líneas de 13,2 kV, subestaciones y celdas de Media Tensión, transformadores de potencia, sistemas eléctricos auxiliares, luminotecnia industrial y la confección de planos y especificaciones técnicas de acuerdo a obra."
duration: "144 horas de cursada"
level: "Avanzado"
language: "Español"
price: 0.0
og_image: "/static/media/cursos/og-instalaciones-aplicaciones-energia.webp"
instructor_id: "agustin-bustos"
sections:
