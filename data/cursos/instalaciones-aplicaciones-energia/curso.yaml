        items:
          - type: "quiz"
            id: "quiz-energia-sec-b"
            slug: "cuestionario-transformadores"
            title: "Cuestionario de Transformadores de Potencia"
            duration: "10 min"
            questions:
              - id: "q-buchholz"
                question: "¿Qué tipo de fallas detecta principalmente el Relé Buchholz en un transformador con tanque de expansión?"
                type: "single_choice"
                options:
                  - "Exclusivamente sobrecargas de larga duración en la línea."
                  - "Fallas internas bajo aceite que generan desprendimiento de gases o flujos rápidos de aceite."
                  - "Fallas en el devanado secundario de baja tensión al aire."
                correct_option: 1
                explanation: "El relé Buchholz se ubica en el caño de interconexión con el tanque de expansión y responde a la acumulación de gases producidos por arcos internos o cortocircuitos bajo aceite."

