        items:
          - type: "lesson"
            id: "les-energia-4-1"
            slug: "suministros-bt"
            title: "4.1 Suministros en Baja Tensión e Instalaciones de BT"
            duration: "25 min"
            content_file: "cap-4-1-suministros-bt.md"
          - type: "lesson"
            id: "les-energia-4-2"
            slug: "coordinacion-selectividad"
            title: "4.2 Coordinación de Protecciones y Selectividad"
            duration: "25 min"
            content_file: "cap-4-2-coordinacion-selectividad.md"
          - type: "lesson"
            id: "les-energia-4-3"
            slug: "luminotecnia"
            title: "4.3 Fundamentos de Luminotecnia y diseño lumínico"
            duration: "25 min"
            content_file: "cap-4-3-luminotecnia.md"

      - id: "chap-energia-cap-5"
        title: "Cap 5: Gestión de Energía, Calidad y Transición"
        description: "Compensación de reactiva, distorsión armónica, redes inteligentes, microredes y sistemas auxiliares de seguridad."
        items:
          - type: "lesson"
            id: "les-energia-5-1"
            slug: "calidad-energia"
            title: "5.1 Calidad de Energía y Compensación de Reactiva"
            duration: "25 min"
            content_file: "cap-5-1-calidad-energia.md"
          - type: "lesson"
            id: "les-energia-5-2"
            slug: "sistemas-gestion-energia-iot"
            title: "5.2 Sistemas de Gestión de Energía (SGE) e IoT"
            duration: "30 min"
            content_file: "cap-5-2-sistemas-gestion-energia-iot.md"
          - type: "lesson"
            id: "les-energia-5-3"
            slug: "generacion-distribuida"
            title: "5.3 Transición Energética y Generación Distribuida"
            duration: "25 min"
            content_file: "cap-5-3-generacion-distribuida.md"
          - type: "lesson"
            id: "les-energia-5-4"
            slug: "sistemas-auxiliares"
            title: "5.4 Sistemas Eléctricos Auxiliares y de Seguridad"
            duration: "25 min"
            content_file: "cap-5-4-sistemas-auxiliares.md"

      - id: "chap-eval-energia-b"
        title: "Evaluación de la Sección B"
        description: "Comprobá tus conocimientos sobre Instalaciones de BT, Calidad, SGE y Sistemas Auxiliares."
        items:
          - type: "quiz"
            id: "quiz-energia-sec-b"
            slug: "cuestionario-baja-tension-gestion"
            title: "Cuestionario de BT, Calidad y Gestión"
            duration: "20 min"
            questions:
              - id: "q-selectividad-energia"
                question: "¿Qué principio de selectividad en Baja Tensión se basa en limitar la energía de paso para que el interruptor de cabecera no comience a abrirse?"
                type: "single_choice"
                options:
                  - "Selectividad Amperométrica"
                  - "Selectividad Cronométrica"
                  - "Selectividad Energética"
                correct_option: 2
                explanation: "La selectividad energética aprovecha la rapidez del interruptor limitador aguas abajo para extinguir la corriente de falla antes de que el interruptor aguas arriba alcance su umbral térmico de disparo."
              - id: "q-armonicos-triples"
                question: "¿Por qué los armónicos impares múltiplos de tres (3º, 9º, etc.) son críticos en sistemas trifásicos equilibrados?"
                type: "single_choice"
                options:
                  - "Porque se cancelan en el neutro, reduciendo pérdidas."
                  - "Porque se suman aritméticamente en el conductor neutro, pudiendo sobrecargarlo críticamente."
                  - "Porque mejoran el factor de potencia general de la planta."
                correct_option: 1
                explanation: "Los armónicos homopolares o triples de secuencia cero se suman en fase en el neutro, requiriendo conductores de neutro adecuadamente sobredimensionados según AEA 90364-5-52."

  # --- SECCIÓN C ---
  - id: "sec-energia-c"
