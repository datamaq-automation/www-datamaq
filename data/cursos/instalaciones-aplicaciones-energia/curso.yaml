      - id: "chap-energia-cap-7"
        title: "Cap 7: Planos e Ingeniería Conforme a Obra"
        description: "Interpretación de planos As-Built, memorias de cálculo y verificaciones obligatorias de seguridad."
        items:
          - type: "lesson"
            id: "les-energia-7-1"
            slug: "planos-conforme-obra"
            title: "7.1 Planos e Ingeniería Conforme a Obra"
            duration: "30 min"
            content_file: "cap-7-1-planos-conforme-obra.md"

      - id: "chap-eval-energia-c"
        title: "Evaluación de la Sección C"
        description: "Comprobá tus conocimientos de Mantenimiento Predictivo y Verificación Conforme a Obra."
        items:
          - type: "quiz"
            id: "quiz-energia-sec-c"
            slug: "cuestionario-inspeccion-obra"
            title: "Cuestionario de Ensayos y Verificaciones Obligatorias"
            duration: "15 min"
            questions:
              - id: "q-verificacion-aislamiento"
                question: "De acuerdo a AEA 90364-6, ¿cuál es la tensión de prueba continua y el valor mínimo de resistencia de aislamiento requerido para una instalación de 380/220 V?"
                type: "single_choice"
                options:
                  - "250 Vcc / 0.5 MΩ"
                  - "500 Vcc / 1.0 MΩ"
                  - "1000 Vcc / 1.0 MΩ"
                correct_option: 1
                explanation: "La norma AEA 90364-6 establece que para tensiones de circuito de hasta 500 V, la tensión de ensayo debe ser de 500 Vcc, y la resistencia de aislamiento mínima admisible es de 1.0 MΩ."
              - id: "q-rpat-desconexion"
                question: "En un esquema TT, el valor de resistencia de puesta a tierra de protección ($R_{\\text{pat}}$) está directamente condicionado a:"
                type: "single_choice"
                options:
                  - "La sensibilidad de la protección diferencial ($I_{\\Delta n}$) para limitar la tensión de contacto a valores seguros."
                  - "El calibre del interruptor magnético principal del TGBT."
                  - "La impedancia del conductor neutro de la distribuidora."
                correct_option: 0
                explanation: "Para garantizar la seguridad contra choques eléctricos en sistemas TT, la resistencia de puesta a tierra debe satisfacer que $R_{\\text{pat}} \\times I_{\\Delta n} \\le U_L$ (donde $U_L$ es la tensión límite de seguridad de 24 V o 50 V)."
