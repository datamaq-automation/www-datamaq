            content_file: "cap-1-2-aisladores-mt.md"

      - id: "chap-energia-cap-2"
        title: "Cap 2: Subestaciones y Cámaras de Transformación"
        description: "Tipos de subestaciones, cámaras de transformación y celdas de media tensión."
        items:
          - type: "lesson"
            id: "les-energia-2-1"
            slug: "tipos-subestaciones"
            title: "2.1 Tipos de subestaciones eléctricas"
            duration: "25 min"
            content_type: "markdown"
            content_file: "cap-2-1-tipos-subestaciones.md"
          - type: "lesson"
            id: "les-energia-2-2"
            slug: "celdas-mt"
            title: "2.2 Celdas de Media Tensión: características y tipos"
            duration: "20 min"
            content_type: "markdown"
            content_file: "cap-2-2-celdas-mt.md"

      - id: "chap-eval-energia-a"
        title: "Evaluación de la Sección A"
        description: "Comprobá tus conocimientos de Media Tensión."
        items:
          - type: "quiz"
            id: "quiz-energia-sec-a"
            slug: "cuestionario-media-tension"
            title: "Cuestionario de Media Tensión"
            duration: "15 min"
            questions:
              - id: "q-mt-voltage"
                question: "¿Cuál es la tensión nominal habitual para líneas de distribución urbana media tensión mencionada en el programa?"
                type: "single_choice"
                options:
                  - "380 V"
                  - "13.2 kV"
                  - "132 kV"
                correct_option: 1
                explanation: "La tensión de 13,2 kV es el estándar habitual de distribución primaria de media tensión en redes aéreas y subterráneas urbanas."
              - id: "q-celdas-aislacion"
                question: "Las celdas de media tensión bajo cubierta metálica pueden utilizar aire o gas SF6 como medio de aislamiento."
                type: "true_false"
                options:
                  - "Verdadero"
                  - "Falso"
                correct_option: 0
                explanation: "Las celdas compactas modernas suelen utilizar gas SF6 (hexafluoruro de azufre) o aire para aislamiento y extinción del arco."

