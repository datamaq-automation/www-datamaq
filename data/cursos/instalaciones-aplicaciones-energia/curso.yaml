    title: "Sección A: Media Tensión y Cámaras de Transformación"
    description: "Líneas de 13.2 kV, subestaciones eléctricas y celdas de Media Tensión."
    chapters:
      - id: "chap-energia-cap-1"
        title: "Cap 1: Líneas de Distribución en 13.2 kV"
        description: "Tipos de líneas aéreas y subterráneas, características mecánicas y eléctricas."
        items:
          - type: "lesson"
            id: "les-energia-1-1"
            slug: "lineas-13-2kv"
            title: "1.1 Características y tipos de líneas de 13.2 kV"
            duration: "20 min"
