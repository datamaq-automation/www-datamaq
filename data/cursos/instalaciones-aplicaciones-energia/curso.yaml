id: "curso-instalaciones-aplicaciones-energia"
slug: "instalaciones-aplicaciones-energia"
title: "Instalaciones y Aplicaciones de la Energía"
description_short: "Curso técnico-práctico sobre instalaciones electromecánicas, media y baja tensión, subestaciones, celdas y sistemas auxiliares."
description_long: "Este curso práctico e integral te guiará a través del diseño, operación y mantenimiento de instalaciones electromecánicas industriales. Aprenderás sobre suministros en Baja Tensión, cámaras de transformación, líneas de 13,2 kV, subestaciones y celdas de Media Tensión, transformadores de potencia, sistemas eléctricos auxiliares, luminotecnia industrial y la confección de planos y especificaciones técnicas de acuerdo a obra."
duration: "144 horas de cursada"
level: "Avanzado"
instructor_id: "agustin-bustos"
sections:
  # --- SECCIÓN A ---
  - id: "sec-energia-a"
    title: "Sección A: Media Tensión y Conversión de Energía"
    description: "Líneas de 13.2 kV, transformadores de potencia y subestaciones eléctricas de Media Tensión."
    chapters:
      - id: "chap-energia-cap-1"
        title: "Cap 1: Líneas de Distribución en 13.2 kV"
        description: "Tipos de líneas aéreas y subterráneas, características mecánicas y eléctricas."
        items:
          - type: "lesson"
            id: "les-energia-1-1"
            slug: "lineas-13-2kv"
            title: "1.1 Características y tipos de líneas de 13.2 kV"
            duration: "20 min"
            content_file: "cap-1-1-lineas-13-2kv.md"
          - type: "lesson"
            id: "les-energia-1-2"
            slug: "aisladores-mt"
            title: "1.2 Aisladores de Media Tensión"
            duration: "15 min"
            content_file: "cap-1-2-aisladores-mt.md"

      - id: "chap-energia-cap-2"
        title: "Cap 2: El Transformador de Potencia"
        description: "Principios de funcionamiento, componentes y de protección física directa del transformador."
        items:
          - type: "lesson"
            id: "les-energia-2-1"
            slug: "transformador-potencia"
            title: "2.1 Principios y componentes del transformador de potencia"
            duration: "30 min"
            content_file: "cap-2-1-transformador-potencia.md"
          - type: "lesson"
            id: "les-energia-2-2"
            slug: "protecciones-transformador"
            title: "2.2 Relé Buchholz y termómetro de contacto"
            duration: "20 min"
            content_file: "cap-2-2-protecciones-transformador.md"

      - id: "chap-energia-cap-3"
        title: "Cap 3: Subestaciones, Cámaras y Celdas de MT"
        description: "Tipos de subestaciones, celdas de media tensión y diseño de mallas de puesta a tierra."
        items:
          - type: "lesson"
            id: "les-energia-3-1"
            slug: "tipos-subestaciones"
            title: "3.1 Tipos de subestaciones eléctricas"
            duration: "25 min"
            content_file: "cap-3-1-tipos-subestaciones.md"
          - type: "lesson"
            id: "les-energia-3-2"
            slug: "celdas-mt"
            title: "3.2 Celdas de Media Tensión: características y tipos"
            duration: "20 min"
            content_file: "cap-3-2-celdas-mt.md"
          - type: "lesson"
            id: "les-energia-3-3"
            slug: "puesta-a-tierra"
            title: "3.3 Diseño de Puesta a Tierra y Seguridad Eléctrica"
            duration: "25 min"
            content_file: "cap-3-3-puesta-a-tierra.md"

      - id: "chap-eval-energia-a"
        title: "Evaluación de la Sección A"
        description: "Comprobá tus conocimientos de Media Tensión, Transformadores y Puesta a Tierra."
        items:
          - type: "quiz"
            id: "quiz-energia-sec-a"
            slug: "cuestionario-media-tension-transformacion"
            title: "Cuestionario de MT y Conversión"
            duration: "20 min"
            questions:
              - id: "q-mt-voltage"
                question: "¿Cuál es la tensión nominal habitual para líneas de distribución urbana media tensión mencionada en el programa?"
                type: "single_choice"
                options:
                  - "380 V"
                  - "13.2 kV"
                  - "132 kV"
                correct_option: 1
                explanation: "La tensión de 13,2 kV es el estándar habitual de distribución primaria de media tensión en redes aéreas y subterráneas urbanas."
              - id: "q-celdas-aislacion"
                question: "Las celdas de media tensión bajo cubierta metálica pueden utilizar aire o gas SF6 como medio de aislamiento."
                type: "true_false"
                options:
                  - "Verdadero"
                  - "Falso"
                correct_option: 0
                explanation: "Las celdas compactas modernas suelen utilizar gas SF6 (hexafluoruro de azufre) o aire para aislamiento y extinción del arco."
              - id: "q-pat-wenner"
                question: "¿Qué método se utiliza para medir la resistividad del terreno antes de diseñar una malla de puesta a tierra en una subestación?"
                type: "single_choice"
                options:
                  - "Método de la caída de potencial con telurímetro"
                  - "Método de Wenner con 4 picas equidistantes"
                  - "Ensayo con Megger de alta tensión"
                correct_option: 1
                explanation: "El método de Wenner utiliza 4 picas alineadas y equidistantes para determinar la resistividad aparente del terreno a diferentes profundidades."
              - id: "q-buchholz"
                question: "¿Qué tipo de fallas detecta principalmente el Relé Buchholz en un transformador con tanque de expansión?"
                type: "single_choice"
                options:
                  - "Exclusivamente sobrecargas de larga duración en la línea."
                  - "Fallas internas bajo aceite que generan desprendimiento de gases o flujos rápidos de aceite."
                  - "Fallas en el devanado secundario de baja tensión al aire."
                correct_option: 1
                explanation: "El relé Buchholz se ubica en el caño de interconexión con el tanque de expansión y responde a la acumulación de gases producidos por arcos internos o cortocircuitos bajo aceite."

  # --- SECCIÓN B ---
  - id: "sec-energia-b"
    title: "Sección B: Baja Tensión, Consumos y Eficiencia"
    description: "Distribución en Baja Tensión, luminotecnia, calidad de potencia, eficiencia energética y transición energética."
    chapters:
      - id: "chap-energia-cap-4"
        title: "Cap 4: Suministros e Instalaciones de BT"
