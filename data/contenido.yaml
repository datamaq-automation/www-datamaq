legal_pages:
  terms:
    title: Términos y condiciones
    last_updated: "2026-06-19"
    introduction: "Estos términos y condiciones regulan el uso del sitio web datamaq.com.ar\
      \ (en adelante, \"el Sitio\"), propiedad de DataMaq. Al acceder y navegar\
      \ por el Sitio, aceptás estos términos en su totalidad. Si no está\
      s de acuerdo, te pedimos que no utilices el Sitio."
    sections:
    - title: 1. Información general
      paragraphs:
      - DataMaq ofrece servicios técnicos de captura automática de datos operativos,
        asesoramiento técnico y capacitaciones aplicadas. La información publicada
        en el Sitio es referencial y puede variar según alcance, tablero, señ
        ales disponibles, conectividad, sistema destino y condiciones de implementació
        n.
    - title: 2. Uso del sitio
      paragraphs:
      - "El usuario se compromete a utilizar el Sitio de manera lícita, respetando\
        \ la legislación vigente y los derechos de terceros. Está prohibido\
        \ el uso del Sitio para actividades fraudulentas, malintencionadas o que\
        \ puedan dañar la imagen de DataMaq."
    - title: 3. Formulario de contacto y datos personales
      paragraphs:
      - "Los datos enviados a través del formulario de contacto se utilizan exclusivamente\
        \ para responder consultas y coordinar servicios. No compartimos tu informació\
        n con terceros sin tu consentimiento, salvo obligación legal."
    - title: 4. Cookies y tecnologías similares
      paragraphs:
      - "El Sitio utiliza cookies propias y de terceros para mejorar la navegació\
        n, analizar el tráfico y habilitar funciones de comunicación. Al aceptar\
        \ el banner de cookies, prestás consentimiento para el uso de aquellas\
        \ que no sean estrictamente necesarias. Podés revocar tu consentimiento\
        \ en cualquier momento eliminando las cookies de tu navegador."
    - title: 5. Propiedad intelectual
      paragraphs:
      - "Todos los contenidos del Sitio, incluyendo textos, imágenes, logotipos\
        \ y código, son propiedad de DataMaq o de sus respectivos titulares.\
        \ Queda prohibida su reproducción, distribución o modificación\
        \ sin autorización expresa."
    - title: 6. Limitación de responsabilidad
      paragraphs:
      - "DataMaq no garantiza la disponibilidad ininterrumpida del Sitio ni la exactitud\
        \ absoluta de la información publicada. La contratación de servicios\
        \ se formaliza mediante propuesta escrita y acuerdo de partes."
    - title: 7. Modificaciones
      paragraphs:
      - "DataMaq se reserva el derecho de modificar estos términos en cualquier\
        \ momento. Las modificaciones entrarán en vigor desde su publicació\
        n en el Sitio."
    - title: 8. Contacto
      paragraphs:
      - "Para consultas sobre estos términos, podés escribirnos a info@datamaq.com.ar\
        \ o contactarnos a través de los canales disponibles en el Sitio."
