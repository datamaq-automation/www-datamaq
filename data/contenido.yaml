    - "Relevamiento en sitio y criterio de implementación."
    - "Instalación, integración y puesta en marcha para captura automática\
      \ de datos."
    - Asesoramiento y capacitaciones sobre Python, datos, bases de datos y APIs en
      contextos reales.
  services:
    cards:
    - description: "Relevamiento, montaje, configuración y puesta en marcha de\
        \ soluciones para medir variables eléctricas y operativas en tableros,\
        \ líneas o puntos definidos."
      id: iot-installation
      key_points:
      - "Medición de kWh, potencia, factor de potencia y distorsión armó\
        nica"
      - Captura de kilos, unidades, metros, velocidades o estados
      - "Integración inicial con Powermate o sistemas de terceros"
      title: "Instalación de equipos IoT para captura de datos"
    - description: "Acompañamiento para estructurar, interpretar y explotar datos\
        \ ya capturados, con foco en seguimiento operativo, diagnóstico y criterio\
        \ de decisión."
      id: data-advisory
      key_points:
      - "Análisis de consumo energético y comportamiento operativo"
      - Ordenamiento de datos desde bases, planillas, APIs o sistemas existentes
      - Soporte para reportes, dashboards y automatizaciones de seguimiento
      title: "Asesoramiento técnico para análisis de datos"
    - description: "Formación técnica orientada a equipos que necesiten trabajar\
        \ con datos operativos, Python, bases de datos, APIs o integraciones sobre\
        \ casos reales."
      id: training
      key_points:
      - Python aplicado con NumPy, pandas y Matplotlib
      - "Buenas prácticas para trabajar con bases de datos y APIs"
      - "Capacitación adaptada al nivel técnico y al caso real del equipo"
      title: Capacitaciones aplicadas
    title: "Servicios técnicos sobre captura, integración y uso de datos"
