  faq:
    questions:
      - question: "¿Qué tipo de datos se pueden capturar?"
        answer: "Según el caso, variables eléctricas como kWh, potencia, factor de potencia y distorsión armónica, o variables operativas como kilos, unidades, metros, velocidades y estados."
      - question: "¿Trabajás solo con energía eléctrica?"
        answer: "No. La energía es una de las aplicaciones principales, pero también se pueden implementar soluciones para captura de datos de producción u otras variables operativas relevantes."
      - question: "¿Usás Powermeter y Automate?"
        answer: "Sí. Según el proyecto, la solución puede apoyarse en Powermeter para medición eléctrica y en Automate para captura e integración de señales y datos operativos."

