content:
  about:
    image:
      alt: "Agustin Bustos, técnico a cargo de la implementación de equipos IoT"
      height: 933
      src: /static/media/tecnico-a-cargo.webp
      width: 700
    paragraphs:
    - "DataMaq trabaja sobre captura automática de datos operativos, con foco en\
      \ energía eléctrica, producción y variables críticas de seguimiento."
    - "El servicio combina relevamiento en campo, implementación técnica, integració\
      n inicial y acompañamiento para que los datos capturados puedan usarse con\
      \ criterio en análisis, seguimiento o capacitación."
    title: Sobre DataMaq
  faq:
    questions:
    - answer: "Según el caso, variables eléctricas como kWh, potencia, factor\
        \ de potencia y distorsión armónica, o variables operativas como kilos,\
        \ unidades, metros, velocidades y estados."
      question: "¿Qué tipo de datos se pueden capturar?"
    - answer: "No. La energía es una de las aplicaciones principales, pero tambié\
        n se pueden implementar soluciones para captura de datos de producción\
        \ u otras variables operativas relevantes."
      question: "¿Trabajás solo con energía eléctrica?"
    - answer: "Sí. Según el proyecto, la solución puede apoyarse en Powermeter\
        \ para medición eléctrica y en Automate para captura e integració\
        n de señales y datos operativos."
      question: "¿Usás Powermeter y Automate?"
  hero:
    badge: "Captura automática de datos operativos"
    benefits:
    - text: "Captura de kWh, potencia, factor de potencia, armónicas, kilos, unidades,\
        \ metros, velocidades o estados según el caso."
      title: Variables definidas
    - text: "Vinculación con Powermate, dashboards o sistemas de terceros cuando\
        \ la conectividad y el objetivo lo permiten."
      title: "Integración según alcance"
    - text: "Datos ordenados y utilizables para seguimiento operativo, diagnóstico,\
        \ reportes o formación técnica."
      title: "Base técnica para análisis"
