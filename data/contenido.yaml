      n tablero, señales disponibles, conectividad, sistema destino y objetivo\
      \ operativo."
    secondaryCta:
      href: '#servicios'
      label: "Ver alcance técnico"
    subtitle: "Implementamos equipos IoT industrial para monitoreo de energía\
      \ y captura automática de datos operativos. Integramos variables elé\
      ctricas y de producción a dashboards o sistemas existentes para mejorar\
      \ el control de planta."
    title: "Monitoreo de energía industrial y captura de datos operativos"
  legal:
