cursos:
  - id: "curso-fastapi-data-science"
    slug: "fastapi-data-science"
    title: "Construyendo Aplicaciones de Ciencia de Datos con FastAPI"
    description_short: "Desarrollá, gestioná y desplegá aplicaciones eficientes de machine learning con Python."
    description_long: "Este curso práctico, basado en el libro 'Building Data Science Applications with FastAPI', te guiará en el desarrollo de APIs robustas de machine learning utilizando Python, FastAPI y Pydantic, cubriendo desde la configuración inicial hasta el despliegue en producción y el procesamiento en tiempo real."
    duration: "45 horas de cursada"
    level: "Avanzado"
    language: "Español"
    price: 0.0
    og_image: "/static/media/cursos/og-fastapi-data-science.webp"
    instructor:
      name: "Agustin Bustos"
      role: "Técnico en Captura de Datos & Programador"
      photo: "/static/media/tecnico-a-cargo.webp"
      bio: "Especialista en captura automática de datos operativos e integración de modelos de ciencia de datos con APIs FastAPI."
    sections:
      # --- SECCIÓN A ---
      - id: "sec-introduccion-fastapi"
        title: "Sección A: Introducción a Python y FastAPI"
        description: "Configuración de entorno, sintaxis de Python, desarrollo de endpoints, inyección de dependencias y validación con Pydantic."
        chapters:
          - id: "chap-cap-1"
            title: "Cap 1: Configuración del Entorno de Desarrollo de Python"
            description: "Requisitos técnicos, pyenv, venv, pip y HTTPie."
            items:
              - type: "lesson"
                id: "les-cap-1-1"
                slug: "requisitos-tecnicos"
                title: "1.1 Requisitos técnicos"
                duration: "5 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-1-1-requisitos-tecnicos.md"
              - type: "lesson"
                id: "les-cap-1-2"
                slug: "instalacion-python-pyenv"
                title: "1.2 Instalación de una distribución de Python usando pyenv"
                duration: "8 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-1-2-instalacion-python.md"
              - type: "lesson"
                id: "les-cap-1-3"
                slug: "creacion-entorno-virtual-python"
                title: "1.3 Creación de un entorno virtual de Python"
                duration: "5 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-1-3-creacion-entorno.md"
              - type: "lesson"
                id: "les-cap-1-4"
                slug: "instalacion-paquetes-pip"
                title: "1.4 Instalación de paquetes de Python con pip"
                duration: "5 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-1-4-instalacion-paquetes.md"
              - type: "lesson"
                id: "les-cap-1-5"
                slug: "instalacion-httpie-consola"
                title: "1.5 Instalación de la utilidad de línea de comandos HTTPie"
                duration: "7 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-1-5-instalacion-httpie.md"
              - type: "lesson"
                id: "les-cap-1-6"
                slug: "resumen-cap-1"
                title: "1.6 Resumen"
                duration: "5 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-1-6-resumen.md"

          - id: "chap-cap-2"
            title: "Cap 2: Especificidades de la Programación en Python"
            description: "Type hints, async/await, list comprehensions y generadores."
            items:
              - type: "lesson"
                id: "les-cap-2"
                slug: "especificidades-programacion-python"
                title: "Clase Completa: Programación Avanzada en Python"
                duration: "35 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-2-programacion-python.md"

          - id: "chap-cap-3"
            title: "Cap 3: Desarrollo de una API RESTful con FastAPI"
            description: "Creación de la aplicación, rutas, métodos HTTP y Uvicorn."
            items:
              - type: "lesson"
                id: "les-cap-3"
                slug: "desarrollo-api-restful-fastapi"
                title: "Videotutorial: API RESTful básica"
                duration: "45 min"
                content_type: "video"
                video_url: "https://www.youtube.com/embed/dQw4w9WgXcQ"
                content: "En este videotutorial crearemos nuestra primera API RESTful real con FastAPI. Aprenderemos sobre la creación de la instancia app, definición de rutas HTTP mediante decoradores (@app.get, @app.post), parámetros de ruta y de consulta, y cómo correr el servidor de desarrollo con recarga automática usando Uvicorn."

          - id: "chap-cap-4"
            title: "Cap 4: Gestión de Modelos de Datos de Pydantic en FastAPI"
            description: "Validación de datos, schemas, tipos avanzados y configuración."
            items:
              - type: "lesson"
                id: "les-cap-4"
                slug: "gestion-modelos-pydantic-fastapi"
                title: "Clase Completa: Validación de Datos con Pydantic"
                duration: "40 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-4-pydantic-models.md"

          - id: "chap-cap-5"
            title: "Cap 5: Inyección de Dependencias en FastAPI"
            description: "Modularidad, reutilización de código y Depends."
            items:
              - type: "lesson"
                id: "les-cap-5"
                slug: "inyeccion-dependencias-fastapi"
                title: "Clase Completa: Inyección de Dependencias"
                duration: "35 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-5-dependency-injections.md"

          - id: "chap-eval-sec-a"
            title: "Evaluación de la Sección A"
            description: "Validá tus conocimientos adquiridos en la Sección A."
            items:
              - type: "quiz"
                id: "quiz-sec-1"
                slug: "cuestionario-introduccion-fastapi"
                title: "Cuestionario de Introducción a Python y FastAPI"
                duration: "10 min"
                questions:
                  - id: "q-hints"
                    question: "¿Cuál de las siguientes es una característica que FastAPI utiliza para realizar validación automática de datos en tiempo de ejecución?"
                    type: "single_choice"
                    options:
                      - "Uvicorn"
                      - "Type Hints (Anotaciones de tipo de Python)"
                      - "Jinja2"
                    correct_option: 1
                    explanation: "FastAPI aprovecha las anotaciones de tipo nativas de Python para realizar la validación automática mediante Pydantic."
                  - id: "q-async"
                    question: "FastAPI permite definir endpoints asíncronos utilizando async def para operaciones de entrada/salida no bloqueantes."
                    type: "true_false"
                    options:
                      - "Verdadero"
                      - "Falso"
                    correct_option: 0
                    explanation: "El uso de async def en FastAPI permite ejecutar llamadas de entrada/salida (I/O) no bloqueantes en el event loop principal."

      # --- SECCIÓN B ---
      - id: "sec-web-backend-fastapi"
        title: "Sección B: Construir y Desplegar un Backend Web Completo con FastAPI"
        description: "Integración con bases de datos asíncronas, seguridad, autenticación, comunicación en tiempo real y despliegue continuo."
        chapters:
          - id: "chap-cap-6"
            title: "Cap 6: Bases de Datos y ORMs Asíncronos"
            description: "SQLAlchemy, AsyncSession y Alembic."
            items:
              - type: "lesson"
                id: "les-cap-6"
                slug: "bases-datos-orms-asincronos"
                title: "Clase Completa: Conectividad Asíncrona con BD"
                duration: "50 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-6-databases-orms.md"

          - id: "chap-cap-7"
            title: "Cap 7: Gestión de Autenticación y Seguridad en FastAPI"
            description: "OAuth2, JWT, hashing de contraseñas y CORS."
            items:
              - type: "lesson"
                id: "les-cap-7"
                slug: "autenticacion-seguridad-fastapi"
                title: "Clase Completa: Seguridad con JWT y OAuth2"
                duration: "45 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-7-authentication-security.md"

          - id: "chap-cap-8"
            title: "Cap 8: Definición de WebSockets para Comunicación Interactiva Bidireccional en FastAPI"
            description: "Protocolo WebSocket, ConnectionManager y comunicación full-duplex."
            items:
              - type: "lesson"
                id: "les-cap-8"
                slug: "websockets-comunicacion-bidireccional"
                title: "Videotutorial: WebSockets en FastAPI"
                duration: "40 min"
                content_type: "video"
                video_url: "https://www.youtube.com/embed/dQw4w9WgXcQ"
                content: "En este videotutorial aprenderemos a implementar WebSockets en FastAPI para habilitar conexiones de tiempo real de baja latencia. Veremos cómo estructurar un gestor de conexiones activas (ConnectionManager) y enviar mensajes de forma bidireccional en formato JSON."

          - id: "chap-cap-9"
            title: "Cap 9: Pruebas de una API de Forma Asíncrona con pytest y HTTPX"
            description: "Estrategias de testing, AsyncClient, fixtures y mocks."
            items:
              - type: "lesson"
                id: "les-cap-9"
                slug: "pruebas-asincronas-pytest-httpx"
                title: "Clase Completa: Testing Asíncrono"
                duration: "45 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-9-testing-pytest.md"

          - id: "chap-cap-10"
            title: "Cap 10: Despliegue de un Proyecto FastAPI"
            description: "Docker, Uvicorn ASGI, Nginx y GitHub Actions."
            items:
              - type: "lesson"
                id: "les-cap-10"
                slug: "despliegue-proyecto-fastapi"
                title: "Clase Completa: Despliegue y CI/CD"
                duration: "40 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-10-deploy-project.md"

          - id: "chap-eval-sec-b"
            title: "Evaluación de la Sección B"
            description: "Validá tus conocimientos adquiridos en la Sección B."
            items:
              - type: "quiz"
                id: "quiz-sec-2"
                slug: "cuestionario-web-backend"
                title: "Cuestionario de Bases de Datos, Seguridad y Despliegue"
                duration: "10 min"
                questions:
                  - id: "q-async-db"
                    question: "¿Por qué se recomienda utilizar un ORM asíncrono en FastAPI?"
                    type: "single_choice"
                    options:
                      - "Porque permite conectarse a bases de datos relacionales sin usar SQL."
                      - "Para evitar bloquear el event loop principal de FastAPI mientras se ejecutan operaciones de consulta lentas."
                      - "Porque aumenta la seguridad de los tokens JWT."
                    correct_option: 1
                    explanation: "Las llamadas de E/S a bases de datos bloquean el flujo de ejecución principal. El uso de llamadas asíncronas cede el control del event loop a otras peticiones pendientes de resolver."
                  - id: "q-websockets"
                    question: "Los WebSockets son un protocolo que permite exclusivamente la comunicación del servidor hacia el cliente en una sola dirección."
                    type: "true_false"
                    options:
                      - "Verdadero"
                      - "Falso"
                    correct_option: 1
                    explanation: "Los WebSockets proveen una comunicación full-duplex bidireccional en tiempo real a través de una única conexión TCP de larga duración."

      # --- SECCIÓN C ---
      - id: "sec-data-science-api"
        title: "Sección C: Construir una API de Ciencia de Datos con Python y FastAPI"
        description: "Manipulación de datos, entrenamiento de modelos con scikit-learn, APIs de predicción eficientes y streaming de video en tiempo real con OpenCV."
        chapters:
          - id: "chap-cap-11"
            title: "Cap 11: Introducción a Numpy y Pandas"
            description: "Arrays de NumPy y DataFrames de Pandas."
            items:
              - type: "lesson"
                id: "les-cap-11"
                slug: "introduccion-numpy-pandas"
                title: "Clase Completa: Análisis de Datos"
                duration: "40 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-11-numpy-pandas.md"

          - id: "chap-cap-12"
            title: "Cap 12: Entrenamiento de Modelos de Machine Learning con scikit-learn"
            description: "Algoritmos, validación cruzada y guardado con Joblib."
            items:
              - type: "lesson"
                id: "les-cap-12"
                slug: "entrenamiento-modelos-scikit-learn"
                title: "Clase Completa: Entrenamiento de Modelos"
                duration: "50 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-12-scikit-learn.md"

          - id: "chap-cap-13"
            title: "Cap 13: Creación de un Endpoint de API de Predicción Eficiente con FastAPI"
            description: "Carga del modelo, endpoints POST e integración lifespan."
            items:
              - type: "lesson"
                id: "les-cap-13"
                slug: "creacion-endpoint-prediccion-fastapi"
                title: "Videotutorial: Endpoint de Predicción"
                duration: "45 min"
                content_type: "video"
                video_url: "https://www.youtube.com/embed/dQw4w9WgXcQ"
                content: "En este videotutorial cargaremos el modelo de Machine Learning exportado con Joblib al arrancar la aplicación de FastAPI y expondremos un endpoint POST '/predict'. El endpoint recibirá datos formateados en un schema Pydantic, ejecutará la predicción del modelo y devolverá los resultados de forma eficiente."

          - id: "chap-cap-14"
            title: "Cap 14: Implementar un Sistema de Detección de Rostros en Tiempo Real Usando Websockets con FastAPI y OpenCV"
            description: "OpenCV, Haar Cascades, decodificación base64 y streaming."
            items:
              - type: "lesson"
                id: "les-cap-14"
                slug: "sistema-deteccion-rostros-websockets"
                title: "Clase Completa: Detección en Tiempo Real"
                duration: "55 min"
                content_type: "markdown"
                content_file: "fastapi-data-science/cap-14-face-detection.md"

          - id: "chap-eval-sec-c"
            title: "Evaluación de la Sección C"
            description: "Validá tus conocimientos adquiridos en la Sección C."
            items:
              - type: "quiz"
                id: "quiz-sec-3"
                slug: "cuestionario-ciencia-datos"
                title: "Cuestionario de Ciencia de Datos y Modelos Predictivos"
                duration: "10 min"
                questions:
                  - id: "q-joblib"
                    question: "¿Cuál es la mejor práctica para servir un modelo de machine learning en FastAPI de forma que no afecte el rendimiento de la API?"
                    type: "single_choice"
                    options:
                      - "Entrenar el modelo de nuevo en cada petición POST recibida del cliente."
                      - "Cargar el modelo serializado (joblib/pickle) una sola vez al arrancar la aplicación (en el evento startup o lifespan) y reutilizarlo en cada petición."
                      - "Guardar el modelo en una base de datos relacional y consultarlo en cada llamada."
                    correct_option: 1
                    explanation: "Cargar los pesos del modelo en memoria es una operación costosa. Al cargarlo una única vez durante la inicialización del ciclo de vida (lifespan) de la app, las llamadas de predicción individuales se resuelven en milisegundos."
                  - id: "q-pandas"
                    question: "Pandas es la herramienta principal utilizada para optimizar cálculos de matrices multidimensionales a bajo nivel."
                    type: "true_false"
                    options:
                      - "Verdadero"
                      - "Falso"
                    correct_option: 1
                    explanation: "NumPy es la librería base que optimiza los cálculos matriciales a bajo nivel, mientras que Pandas se construye sobre ella para proveer manipulación tabular y análisis de alto nivel a través de DataFrames."

  - id: "curso-conversation-ai-rasa"
    slug: "conversation-ai-rasa"
    title: "Conversation AI with RASA"
    description_short: "Build, test and deploy AI-powered, enterprise-grade virtual assistants and chatbots."
    description_long: "Este curso práctico e interactivo te guiará en el desarrollo de asistentes virtuales y chatbots conversacionales de nivel empresarial utilizando el framework de código abierto Rasa. Aprenderás desde los fundamentos del procesamiento del lenguaje natural (NLU) y el diseño de diálogos contextuales con Rasa Core, hasta el manejo de la lógica de negocio con Custom Actions, la integración de bases de conocimiento, el testing automático y las mejores prácticas para el despliegue a producción en arquitecturas reales."
    duration: "40 horas de cursada"
    level: "Avanzado"
    language: "Inglés/Español"
    price: 0.0
    og_image: "/static/media/cursos/og-fastapi-data-science.webp"
    instructor:
      name: "Agustin Bustos"
      role: "Técnico en Captura de Datos & Programador"
      photo: "/static/media/tecnico-a-cargo.webp"
      bio: "Especialista en captura automática de datos operativos e integración de modelos conversacionales y APIs en entornos industriales."
    sections:
      # --- SECCIÓN A ---
      - id: "sec-rasa-a"
        title: "Section A: The Rasa Framework"
        description: "Fundamentos del framework Rasa, procesamiento de lenguaje natural y gestión del diálogo."
        chapters:
          - id: "chap-rasa-cap-1"
            title: "Cap 1: Introduction to Chatbots and the Rasa Framework"
            description: "Arquitectura conversacional, por qué usar Rasa y configuración básica de un asistente."
            items:
              - type: "lesson"
                id: "les-rasa-1-1"
                slug: "introduccion-rasa"
                title: "1.1 Introducción al desarrollo conversacional"
                duration: "10 min"
                content_type: "markdown"
                content: "El desarrollo de interfaces conversacionales inteligentes requiere comprender la diferencia entre sistemas basados en reglas y asistentes contextuales basados en aprendizaje automático. En esta clase introductoria veremos la arquitectura de Rasa (Rasa NLU y Rasa Core) y cómo inicializar nuestro primer proyecto con 'rasa init'."

          - id: "chap-rasa-cap-2"
            title: "Cap 2: Natural Language Understanding in RASA"
            description: "Extracción de entidades, reconocimiento de intenciones y diseño de pipelines NLU."
            items:
              - type: "lesson"
                id: "les-rasa-2-1"
                slug: "nlu-intenciones-entidades"
                title: "2.1 Reconocimiento de intenciones y entidades"
                duration: "15 min"
                content_type: "markdown"
                content: "Rasa NLU procesa los mensajes del usuario para extraer intenciones (intents) y entidades (entities). Analizaremos cómo balancear los datos de entrenamiento conversacionales y cómo estructurar el pipeline de procesamiento (tokenizadores, componentes de featurización y clasificadores como DIETClassifier) en el archivo 'config.yml'."

          - id: "chap-rasa-cap-3"
            title: "Cap 3: Rasa Core"
            description: "Gestión de diálogos basada en historias, reglas y políticas conversacionales."
            items:
              - type: "lesson"
                id: "les-rasa-3-1"
                slug: "gestion-dialogo-core"
                title: "3.1 Gestión de flujos de diálogo con Rasa Core"
                duration: "15 min"
                content_type: "markdown"
                content: "Rasa Core es el motor de decisiones encargado de predecir la siguiente acción en el flujo conversacional basándose en el historial. Estudiaremos cómo diseñar historias (stories), definir reglas (rules) y configurar las políticas de diálogo (como TEDPolicy y RulePolicy) para gestionar desvíos conversacionales complejos."

      # --- SECCIÓN B ---
      - id: "sec-rasa-b"
        title: "Section B: Rasa in Action"
        description: "Desarrollo práctico de asistentes, lógica de negocio personalizada e integraciones."
        chapters:
          - id: "chap-rasa-cap-4"
            title: "Cap 4: Handling Business Logic"
            description: "Uso de Custom Actions, Slots y Formularios (Forms)."
            items:
              - type: "lesson"
                id: "les-rasa-4-1"
                slug: "custom-actions-forms"
                title: "4.1 Lógica de negocio con Custom Actions y Formularios"
                duration: "20 min"
                content_type: "markdown"
                content: "Las acciones personalizadas (Custom Actions) nos permiten conectar nuestro asistente con APIs externas o bases de datos a través de un Action Server (ejecutado por defecto en el puerto 5005/5006). Aprenderemos a validar entradas de usuario, almacenar datos en Slots e implementar Formularios para recopilar información de manera guiada y robusta."

          - id: "chap-rasa-cap-5"
            title: "Cap 5: Working with Response Selector to Handle Chitchat and FAQs"
            description: "Gestión de preguntas frecuentes y conversaciones informales fuera de flujo."
            items:
              - type: "lesson"
                id: "les-rasa-5-1"
                slug: "response-selector-faq"
                title: "5.1 Respuestas rápidas y Chitchat"
                duration: "10 min"
                content_type: "markdown"
                content: "El Response Selector permite resolver consultas de tipo pregunta-respuesta (FAQ) y conversaciones informales (chitchat) utilizando un pipeline de NLU optimizado. Veremos cómo estructurar los datos bajo intenciones secundarias y mapear las respuestas en el archivo 'domain.yml' de manera modular."

          - id: "chap-rasa-cap-6"
            title: "Cap 6: Knowledge Base Action to Handle Question Answering"
            description: "Integración de bases de conocimiento y consultas de grafos en acciones personalizadas."
            items:
              - type: "lesson"
                id: "les-rasa-6-1"
                slug: "knowledge-base-actions"
                title: "6.1 Consultas a bases de conocimiento"
                duration: "15 min"
                content_type: "markdown"
                content: "Cuando la información es dinámica y estructurada, es inviable definir historias para cada consulta. Utilizaremos la clase 'ActionQueryKnowledgeBase' de Rasa para conectar el bot a bases de datos relacionales, archivos JSON u otras fuentes complejas, permitiendo resolver preguntas como '¿Cuál es el precio del artículo X?' de forma automatizada."

          - id: "chap-rasa-cap-7"
            title: "Cap 7: Entity Roles and Groups for Complex Named Entity"
            description: "Uso de roles y grupos para desambiguar entidades similares."
            items:
              - type: "lesson"
                id: "les-rasa-7-1"
                slug: "roles-grupos-entidades"
                title: "7.1 Roles y grupos de entidades"
                duration: "12 min"
                content_type: "markdown"
                content: "Rasa permite clasificar entidades con Roles (por ejemplo, definir 'origen' y 'destino' para una entidad 'localidad') y Grupos (asociar elementos como 'tamaño' e 'ingrediente' a una pizza específica). Estudiaremos cómo entrenar el extractor DIET para reconocer estas jerarquías conversacionales complejas."

          - id: "chap-rasa-cap-8"
            title: "Cap 8: Working Principles and Customization of Rasa"
            description: "Profundización en el ciclo de vida de Rasa y componentes de ML customizados."
            items:
              - type: "lesson"
                id: "les-rasa-8-1"
                slug: "principios-personalizacion"
                title: "8.1 Personalización y desarrollo de componentes customizados"
                duration: "15 min"
                content_type: "markdown"
                content: "Analizaremos cómo extender el comportamiento del framework creando tokenizadores o clasificadores NLU personalizados en Python. Conoceremos el ciclo de vida de entrenamiento del agente Conversational AI y el flujo de guardado y carga de modelos empaquetados en archivos '.tar.gz'."

      # --- SECCIÓN C ---
      - id: "sec-rasa-c"
        title: "Section C: Best Practices"
        description: "Pruebas de calidad, despliegue a producción y desarrollo guiado por conversaciones."
        chapters:
          - id: "chap-rasa-cap-9"
            title: "Cap 9: Testing and Production Deployment"
            description: "Testing automático, CI/CD, Rasa X/Enterprise y Dockerización."
            items:
              - type: "lesson"
                id: "les-rasa-9-1"
                slug: "testing-despliegue-produccion"
                title: "9.1 Automatización de tests y despliegue del bot"
                duration: "20 min"
                content_type: "markdown"
                content: "Un asistente en producción requiere un flujo robusto de testing continuo. Estudiaremos cómo escribir historias de prueba ('test_stories.yml') para evaluar regresiones de NLU y Core en Rasa, y cómo dockerizar la aplicación y el Action Server en contenedores para su despliegue en la nube mediante docker-compose o Kubernetes."

          - id: "chap-rasa-cap-10"
            title: "Cap 10: Conversation-Driven Development and Interactive Learning"
