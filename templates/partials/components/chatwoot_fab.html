{% macro chatwoot_fab(base_url, website_token) %}
{% if base_url and website_token %}
<button id="chatwoot-config" 
        class="c-chatwoot-fab" 
        data-base-url="{{ base_url }}" 
        data-website-token="{{ website_token }}"
        aria-label="Abrir chat de soporte técnico"
        title="Soporte técnico en línea">
    <!-- Icono de mensaje/diálogo de soporte (Chatwoot Rounded) -->
    <svg class="c-chatwoot-fab__icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
        <path d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7z" />
    </svg>
    <!-- Spinner para cuando está cargando el SDK -->
    <div class="c-chatwoot-fab__spinner"></div>
</button>
{% endif %}
{% endmacro %}
