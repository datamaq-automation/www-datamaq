{% macro chatwoot_fab(base_url, website_token) %}
{% if base_url and website_token %}
<button id="chatwoot-config" 
        class="c-chatwoot-fab" 
        data-base-url="{{ base_url }}" 
        data-website-token="{{ website_token }}"
        aria-label="Abrir chat de soporte técnico"
        title="Soporte técnico en línea">
    <!-- Icono de mensaje/diálogo de soporte -->
    <svg class="c-chatwoot-fab__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
        <path fill="currentColor" d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 12h-2v-2h2v2zm0-4h-2V6h2v4z"></path>
    </svg>
    <!-- Spinner para cuando está cargando el SDK -->
    <div class="c-chatwoot-fab__spinner"></div>
</button>
{% endif %}
{% endmacro %}
